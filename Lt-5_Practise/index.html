<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analysis Tool</title>
    <link rel="stylesheet" href="F:\Desktop\WTechSpring_25-26\Lt-5_Practise\index.css">

<body>

    <header>
        <h1>Text Analysis Tool</h1>
    </header>

    <div class="container">
        <fieldset>
            <legend>Enter Text</legend>

            <textarea id="inputText"></textarea>
            <br><br>

            <button onclick="analyzeText()">Analyze Text</button>

            <div class="result-box">
                <h3>Result</h3>
                <p>Total Characters: <span id="charCount">0</span></p>
                <p>Total Words: <span id="wordCount">0</span></p>
                <p>Reversed Text: <span id="reversedText"></span></p>
            </div>
        </fieldset>
    </div>

    <script src="F:\Desktop\WTechSpring_25-26\Lt-5_Practise\index.js"></script>
